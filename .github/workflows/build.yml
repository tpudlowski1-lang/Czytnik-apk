name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Zainstaluj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Zainstaluj zależności
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential ccache
          pip install --upgrade pip
          pip install buildozer cython

      - name: Kompiluj APK
        run: buildozer -v android debug

      - name: Wgraj APK
        uses: actions/upload-artifact@v4
        with:
          name: czytnik-apk
          path: bin/*.apk
          retention-days: 30
