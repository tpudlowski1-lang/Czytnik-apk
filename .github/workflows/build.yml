name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Zainstaluj Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Zainstaluj Android SDK
        uses: android-actions/setup-android@v3

      - name: Zaakceptuj licencje i zainstaluj build-tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;34.0.0" "platforms;android-33" "ndk;25.2.9519653"

      - name: Zainstaluj zależności systemowe
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip cmake build-essential \
            libffi-dev libssl-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5

      - name: Zainstaluj buildozer i cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Skonfiguruj SDK dla buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -s $ANDROID_HOME ~/.buildozer/android/platform/android-sdk

      - name: Kompiluj APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        run: |
          buildozer -v android debug

      - name: Wgraj APK
        uses: actions/upload-artifact@v4
        with:
          name: czytnik-apk
          path: bin/*.apk
          retention-days: 30
