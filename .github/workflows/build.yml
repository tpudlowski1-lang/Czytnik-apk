name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Zainstaluj zależności systemowe
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip cmake build-essential \
            libffi-dev libssl-dev zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5

      - name: Zainstaluj buildozer i cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Zaakceptuj licencje SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/*/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/*/bin/sdkmanager "build-tools;34.0.0" "platforms;android-33"

      - name: Skonfiguruj buildozer żeby używał systemowego SDK i NDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_NDK_HOME ~/.buildozer/android/platform/android-ndk-r27

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Kompiluj APK
        env:
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
        run: buildozer -v android debug

      - uses: actions/upload-artifact@v4
        with:
          name: czytnik-apk
          path: bin/*.apk
          retention-days: 30        with:
          name: czytnik-apk
          path: bin/*.apk
          retention-days: 30
      - name: Wgraj APK
        uses: actions/upload-artifact@v4
        with:
          name: czytnik-apk
          path: bin/*.apk
          retention-days: 30
